name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-examples
          path: .deps/skenion-examples
      - uses: bufbuild/buf-setup-action@v1.50.0
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - run: node scripts/validate-with-contracts.mjs
        working-directory: .deps/skenion-examples
        env:
          SKENION_CONTRACTS_PACKAGE: ../../packages/ts/dist
