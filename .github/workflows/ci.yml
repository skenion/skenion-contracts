name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: echovisionlab/skenion-examples
          path: .deps/skenion-examples
      - name: Align examples dependency branch
        if: github.event_name == 'pull_request'
        run: |
          cd .deps/skenion-examples
          if git ls-remote --exit-code origin "refs/heads/${GITHUB_HEAD_REF}" >/dev/null 2>&1; then
            git fetch --depth=1 origin "${GITHUB_HEAD_REF}"
            git checkout FETCH_HEAD
          fi
      - uses: bufbuild/buf-setup-action@v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run ci
      - run: node scripts/validate-with-contracts.mjs
        working-directory: .deps/skenion-examples
        env:
          SKENION_CONTRACTS_PACKAGE: ../../packages/ts/dist
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-contracts-rust
          workspaces: packages/rust -> target
          cache-all-crates: "true"
          cache-on-failure: "true"
      - name: Check Rust lockfile is release-clean
        run: |
          cargo metadata --manifest-path packages/rust/Cargo.toml --locked --format-version 1 >/dev/null
          cargo package --manifest-path packages/rust/Cargo.toml --locked --no-verify
          git diff --exit-code -- packages/rust/Cargo.lock
      - run: cargo fmt --check --manifest-path packages/rust/Cargo.toml
      - run: cargo clippy --manifest-path packages/rust/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path packages/rust/Cargo.toml --all-targets --all-features
      - run: rustup component add llvm-tools-preview
      - run: cargo install cargo-llvm-cov --locked
      - run: cargo llvm-cov --manifest-path packages/rust/Cargo.toml --all-targets --all-features --fail-uncovered-lines 0 --fail-under-functions 100
