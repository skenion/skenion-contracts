name: Sync Release Lockfile

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-lockfile:
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.head.repo.full_name == github.repository
      && startsWith(github.event.pull_request.head.ref, 'release-please--branches--main--components--skenion-contracts')
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
      - run: rustup show
      - run: cargo metadata --manifest-path packages/rust/Cargo.toml --format-version 1 >/dev/null
      - name: Commit Rust lockfile sync
        run: |
          if git diff --quiet -- packages/rust/Cargo.lock; then
            echo "Cargo.lock is already aligned."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/rust/Cargo.lock
          git commit -m "chore(main): sync Rust lockfile for release"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
