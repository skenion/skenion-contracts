name: Sync Release Lockfile

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust-lockfile:
    name: Sync Rust lockfile
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'release-please--branches--main--components--skenion-contracts'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          # Requires an explicit org/app/PAT token; default workflow tokens cannot push follow-on commits.
          token: ${{ secrets.GH_TOKEN }}
      - run: rustup show
      - run: cargo metadata --manifest-path packages/rust/Cargo.toml --format-version 1 >/dev/null
      - name: Commit Rust lockfile sync
        env:
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet -- packages/rust/Cargo.lock; then
            echo "Cargo.lock is already aligned."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/rust/Cargo.lock
          git commit -m "chore(main): sync Rust lockfile for release"
          git push origin "HEAD:${PR_HEAD_REF}"
