name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'skenion-contracts-v')
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10.12.4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skenion/contracts run build
      - id: package
        run: |
          version="$(node -p "require('./packages/ts/package.json').version")"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - run: |
          expected="skenion-contracts-v${{ steps.package.outputs.version }}"
          actual="${{ github.event.release.tag_name }}"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "release tag ${actual} does not match package version ${expected}" >&2
            exit 1
          fi
      - id: registry
        run: |
          if npm view "@skenion/contracts@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
      - if: steps.registry.outputs.published != 'true'
        run: npm publish --access public --provenance
        working-directory: packages/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  crates:
    name: crates.io
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'skenion-contracts-v')
    steps:
      - uses: actions/checkout@v6
      - run: rustup show
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: skenion-contracts-publish-rust
          workspaces: packages/rust -> target
          cache-all-crates: "true"
      - id: package
        run: |
          version="$(cargo metadata --manifest-path packages/rust/Cargo.toml --no-deps --format-version 1 | python3 -c 'import json, sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - run: |
          expected="skenion-contracts-v${{ steps.package.outputs.version }}"
          actual="${{ github.event.release.tag_name }}"
          if [[ "${actual}" != "${expected}" ]]; then
            echo "release tag ${actual} does not match crate version ${expected}" >&2
            exit 1
          fi
      - id: registry
        run: |
          if curl --fail --silent "https://crates.io/api/v1/crates/skenion-contracts/${{ steps.package.outputs.version }}" >/dev/null; then
            echo "published=true" >> "${GITHUB_OUTPUT}"
          else
            echo "published=false" >> "${GITHUB_OUTPUT}"
          fi
      - run: cargo package --manifest-path packages/rust/Cargo.toml
      - if: steps.registry.outputs.published != 'true'
        run: cargo publish --manifest-path packages/rust/Cargo.toml --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
