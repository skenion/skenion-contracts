name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release-as:
        description: Optional repo-local SemVer override, for example 0.45.1
        required: false
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        if: ${{ github.event_name != 'workflow_dispatch' || inputs['release-as'] == '' }}
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

      - name: Run Release Please with release-as
        if: ${{ github.event_name == 'workflow_dispatch' && inputs['release-as'] != '' }}
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: main
          release-as: ${{ inputs['release-as'] }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
