openapi: 3.1.0
info:
  title: Skenion Runtime HTTP API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Return local runtime health.
      responses:
        "200":
          description: Runtime is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v0/runtime/info:
    get:
      summary: Return runtime identity and capability metadata.
      responses:
        "200":
          description: Runtime metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeInfoResponse"
  /v0/io/devices:
    get:
      summary: Return currently enumerable runtime IO devices.
      responses:
        "200":
          description: Runtime IO devices. Device ids are transport-scoped handles for node IO bindings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeIoDeviceListResponse"
  /v0/validate:
    post:
      summary: Validate a complete project payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "200":
          description: Project validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeApiResponse"
  /v0/plan:
    post:
      summary: Validate and build an execution plan for a project payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "200":
          description: Project planning result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeApiResponse"
  /v0/run:
    post:
      summary: Validate, plan, and run a dummy execution for a project payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunProjectRequest"
      responses:
        "200":
          description: Dummy execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeApiResponse"
  /v0/session:
    get:
      summary: Return the current local runtime session state.
      responses:
        "200":
          description: Current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
    delete:
      summary: Clear the current local runtime session.
      responses:
        "200":
          description: Cleared session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/events/stream:
    get:
      summary: Stream Runtime-authoritative session snapshots with Server-Sent Events.
      responses:
        "200":
          description: Session event stream. Each event carries a full canonical snapshot and history.
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                session:
                  value: |
                    event: session
                    data: {"schema":"skenion.runtime.session.event","schemaVersion":"0.1.0","kind":"snapshot"}
  /v0/session/load:
    post:
      summary: Validate and load a project payload into the local runtime session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "200":
          description: Session state after load attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/validate:
    post:
      summary: Validate the currently loaded local runtime session.
      responses:
        "200":
          description: Session validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/plan:
    post:
      summary: Build an execution plan for the currently loaded local runtime session.
      responses:
        "200":
          description: Session planning result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/run:
    post:
      summary: Run a dummy execution from the currently loaded local runtime session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRunRequest"
      responses:
        "200":
          description: Session dummy execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/mutate:
    post:
      summary: Apply a graph and/or view mutation to the currently loaded local runtime session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeMutationRequest"
      responses:
        "200":
          description: Mutation result and current Runtime-authoritative session snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeMutationResponse"
  /v0/session/history:
    get:
      summary: Return the current local runtime mutation history.
      responses:
        "200":
          description: Current session mutation history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeHistory"
  /v0/session/control/event:
    post:
      summary: Dispatch a runtime-only control event to the current local session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeControlEventRequest"
      responses:
        "200":
          description: Control event dispatch result and emitted output values.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeControlEventResponse"
  /v0/session/control/state:
    get:
      summary: Return runtime-only control state for the current local session.
      responses:
        "200":
          description: Current control values by stateful value node id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeControlStateResponse"
  /v0/session/control/read:
    post:
      summary: Read a graph param, port metadata, or runtime control state by node address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeControlReadRequest"
      responses:
        "200":
          description: Addressed control read result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeControlReadResponse"
  /v0/session/undo:
    post:
      summary: Undo the latest accepted runtime mutation in the local runtime session.
      responses:
        "200":
          description: Undo result and current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeMutationResponse"
  /v0/session/redo:
    post:
      summary: Redo the latest undone runtime mutation in the local runtime session.
      responses:
        "200":
          description: Redo result and current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeMutationResponse"
  /v0/session/preview:
    get:
      summary: Return the current local runtime session preview status.
      responses:
        "200":
          description: Current session preview status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePreviewStatusResponse"
  /v0/session/preview/start:
    post:
      summary: Start the local native preview for the currently loaded session.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimePreviewStartRequest"
      responses:
        "200":
          description: Preview status after start attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePreviewStatusResponse"
  /v0/session/preview/stop:
    post:
      summary: Stop the current local native preview.
      responses:
        "200":
          description: Preview status after stop attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePreviewStatusResponse"
  /v0/session/preview/restart:
    post:
      summary: Restart the local native preview from the current session plan.
      responses:
        "200":
          description: Preview status after restart attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePreviewStatusResponse"
  /v0/session/telemetry:
    get:
      summary: Return a read-only runtime telemetry snapshot.
      responses:
        "200":
          description: Current session, preview, render, and process telemetry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeTelemetrySnapshot"
  /v0/session/telemetry/stream:
    get:
      summary: Stream runtime telemetry snapshots with Server-Sent Events.
      responses:
        "200":
          description: Runtime telemetry event stream.
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                telemetry:
                  value: |
                    event: telemetry
                    data: {"schema":"skenion.runtime.telemetry","schemaVersion":"0.1.0","ok":true}
  /v0/session/render/generated-shader:
    get:
      summary: Return the generated WGSL source for the current fullscreen shader preview.
      responses:
        "200":
          description: Generated shader source or diagnostics explaining why it is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedShaderResponse"
  /v0/assets/import:
    post:
      summary: Import a local asset into the Runtime's local asset store.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/RuntimeAssetImportRequest"
      responses:
        "200":
          description: Imported asset metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeAssetImportResponse"
  /v0/assets:
    get:
      summary: List assets imported into the local Runtime asset store.
      responses:
        "200":
          description: Current local runtime assets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeAssetListResponse"
  /v0/assets/{assetId}:
    get:
      summary: Return metadata for one imported runtime asset.
      parameters:
        - name: assetId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Runtime asset metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeAssetGetResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - ok
        - service
        - version
      properties:
        ok:
          type: boolean
        service:
          type: string
          const: skenion-runtime
        version:
          type: string
    RuntimeInfoResponse:
      type: object
      required:
        - name
        - version
        - apiVersion
        - capabilities
      properties:
        name:
          type: string
          const: skenion-runtime
        version:
          type: string
        apiVersion:
          type: string
          const: 0.1.0
        capabilities:
          type: array
          items:
            type: string
          examples:
            - ["project.validate", "project.plan", "dummy.run", "session.load", "session.events.stream", "session.validate", "session.plan", "session.run", "session.mutate", "session.history", "session.undo", "session.redo", "session.control.event", "session.control.state", "session.control.read", "session.preview.status", "session.preview.start", "session.preview.stop", "session.preview.restart", "session.preview.controlState", "session.render.generatedShader", "session.telemetry", "session.telemetry.stream", "runtime.logs", "io.devices", "session.clear"]
    RuntimeClockDiagnosticSeverity:
      type: string
      enum:
        - warning
        - error
    RuntimeClockDiagnostic:
      type: object
      required:
        - severity
        - code
        - message
      properties:
        severity:
          $ref: "#/components/schemas/RuntimeClockDiagnosticSeverity"
        code:
          type: string
          examples:
            - invalid-midi-clock-message
        message:
          type: string
      additionalProperties: false
    RuntimeIoDiagnosticSeverity:
      type: string
      enum:
        - warning
        - error
    RuntimeIoDiagnostic:
      type: object
      required:
        - severity
        - code
        - message
      properties:
        severity:
          $ref: "#/components/schemas/RuntimeIoDiagnosticSeverity"
        code:
          type: string
          examples:
            - io-device-enumeration-failed
            - io-device-name-unavailable
        message:
          type: string
      additionalProperties: false
    ClockTimeSignatureV01:
      type: object
      required:
        - numerator
        - denominator
      properties:
        numerator:
          type: integer
          minimum: 1
        denominator:
          type: integer
          minimum: 1
      additionalProperties: false
    ClockStateV01:
      type: object
      required:
        - sourceId
        - sourceKind
        - capabilities
      properties:
        sourceId:
          type: string
        sourceKind:
          type: string
        capabilities:
          type: array
          items:
            type: string
        lastUpdateHostTimeNs:
          type: integer
          minimum: 0
      additionalProperties: true
    RuntimeIoTransportKind:
      type: string
      enum:
        - midi
        - hid
        - serial
        - inline
    RuntimeIoDirection:
      type: string
      enum:
        - input
        - output
    RuntimeIoDeviceDescriptor:
      type: object
      required:
        - id
        - name
        - transportKind
        - directions
        - backend
        - stable
      properties:
        id:
          type: string
          minLength: 1
        name:
          type: string
        transportKind:
          $ref: "#/components/schemas/RuntimeIoTransportKind"
        directions:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeIoDirection"
        backend:
          type: string
        index:
          type: integer
          minimum: 0
          description: Current backend enumeration index when no stable id is available.
        stable:
          type: boolean
          description: True when id is stable across runtime restarts and device reordering.
      additionalProperties: false
    RuntimeIoDeviceListResponse:
      type: object
      required:
        - ok
        - devices
        - diagnostics
      properties:
        ok:
          type: boolean
        devices:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeIoDeviceDescriptor"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeIoDiagnostic"
      additionalProperties: false
    RuntimeIoInlineFrame:
      type: object
      required:
        - atNs
        - bytes
      properties:
        atNs:
          type: integer
          minimum: 0
        bytes:
          type: array
          items:
            type: integer
            minimum: 0
            maximum: 255
      additionalProperties: false
    RuntimeIoBindingConfig:
      oneOf:
        - type: object
          required:
            - kind
            - deviceId
          properties:
            kind:
              type: string
              const: midi
            deviceId:
              type: string
              minLength: 1
          additionalProperties: false
        - type: object
          required:
            - kind
            - deviceId
          properties:
            kind:
              type: string
              const: hid
            deviceId:
              type: string
              minLength: 1
          additionalProperties: false
        - type: object
          required:
            - kind
            - deviceId
          properties:
            kind:
              type: string
              const: serial
            deviceId:
              type: string
              minLength: 1
            baudRate:
              type: integer
              minimum: 1
          additionalProperties: false
        - type: object
          required:
            - kind
            - frames
          properties:
            kind:
              type: string
              const: inline
            frames:
              type: array
              items:
                $ref: "#/components/schemas/RuntimeIoInlineFrame"
          additionalProperties: false
    ProjectRequest:
      type: object
      required:
        - graph
        - nodes
      properties:
        graph:
          $ref: "#/components/schemas/GraphDocumentV01"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeDefinitionManifestV01"
        viewState:
          type: object
          additionalProperties: true
    RunProjectRequest:
      allOf:
        - $ref: "#/components/schemas/ProjectRequest"
        - type: object
          properties:
            frames:
              type: integer
              minimum: 0
    RuntimeApiResponse:
      type: object
      required:
        - ok
        - diagnostics
        - plan
        - report
      properties:
        ok:
          type: boolean
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
        plan:
          anyOf:
            - $ref: "#/components/schemas/ExecutionPlan"
            - type: "null"
        report:
          anyOf:
            - $ref: "#/components/schemas/DummyExecutionReport"
            - type: "null"
    RuntimeSessionResponse:
      type: object
      required:
        - ok
        - snapshot
        - diagnostics
        - report
      properties:
        ok:
          type: boolean
        snapshot:
          $ref: "#/components/schemas/RuntimeSessionSnapshot"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
        report:
          anyOf:
            - $ref: "#/components/schemas/DummyExecutionReport"
            - type: "null"
    RuntimeSessionSnapshot:
      type: object
      required:
        - sessionRevision
        - viewRevision
        - controlRevision
        - project
        - diagnostics
        - plan
      properties:
        sessionRevision:
          type: integer
          minimum: 0
        viewRevision:
          type: integer
          minimum: 0
        controlRevision:
          type: integer
          minimum: 0
        project:
          anyOf:
            - $ref: "#/components/schemas/RuntimeProjectSnapshot"
            - type: "null"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
        plan:
          anyOf:
            - $ref: "#/components/schemas/ExecutionPlan"
            - type: "null"
      additionalProperties: false
    RuntimeProjectSnapshot:
      type: object
      required:
        - graph
        - viewState
        - nodes
      properties:
        graph:
          $ref: "#/components/schemas/GraphDocumentV01"
        viewState:
          type: object
          additionalProperties: true
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeDefinitionManifestV01"
      additionalProperties: false
    SessionRunRequest:
      type: object
      properties:
        frames:
          type: integer
          minimum: 0
    RuntimeMutationRequest:
      type: object
      properties:
        graphPatch:
          $ref: "#/components/schemas/GraphPatchV01"
        viewPatch:
          $ref: "#/components/schemas/RuntimeViewPatch"
        clientId:
          type: string
        description:
          type: string
      additionalProperties: false
    RuntimeViewPatch:
      type: object
      required:
        - baseViewRevision
        - ops
      properties:
        baseViewRevision:
          type: integer
          minimum: 0
        ops:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeViewPatchOperation"
      additionalProperties: false
    RuntimeViewPatchOperation:
      oneOf:
        - type: object
          required:
            - op
            - nodeId
            - view
          properties:
            op:
              type: string
              const: setNodeView
            nodeId:
              type: string
            view:
              type: object
              additionalProperties: true
          additionalProperties: false
        - type: object
          required:
            - op
            - nodeId
            - to
          properties:
            op:
              type: string
              const: moveNodeView
            nodeId:
              type: string
            from:
              type: object
              additionalProperties: true
            to:
              type: object
              additionalProperties: true
          additionalProperties: false
    RuntimeMutationResponse:
      type: object
      required:
        - ok
        - applied
        - conflict
        - snapshot
        - history
        - diagnostics
      properties:
        ok:
          type: boolean
        applied:
          type: boolean
        conflict:
          type: boolean
        snapshot:
          $ref: "#/components/schemas/RuntimeSessionSnapshot"
        history:
          $ref: "#/components/schemas/RuntimeHistory"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
      additionalProperties: false
    RuntimeSessionEventKind:
      type: string
      enum:
        - snapshot
        - load
        - clear
        - mutate
        - undo
        - redo
    RuntimeSessionEvent:
      type: object
      required:
        - schema
        - schemaVersion
        - id
        - sequence
        - kind
        - snapshot
        - history
        - diagnostics
        - createdAt
      properties:
        schema:
          type: string
          const: skenion.runtime.session.event
        schemaVersion:
          type: string
          const: 0.1.0
        id:
          type: string
        sequence:
          type: integer
          minimum: 1
        kind:
          $ref: "#/components/schemas/RuntimeSessionEventKind"
        snapshot:
          $ref: "#/components/schemas/RuntimeSessionSnapshot"
        history:
          $ref: "#/components/schemas/RuntimeHistory"
        mutation:
          $ref: "#/components/schemas/RuntimeHistoryEntry"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
        createdAt:
          type: string
      additionalProperties: false
    RuntimeControlValue:
      oneOf:
        - type: object
          required:
            - type
            - representation
            - value
          properties:
            type:
              type: string
              const: float
            representation:
              type: string
              enum:
                - f64
                - f32
                - f16
                - f8.e4m3
                - f8.e5m2
            value:
              type: number
          additionalProperties: false
        - type: object
          required:
            - type
            - representation
            - value
          properties:
            type:
              type: string
              const: int
            representation:
              type: string
              enum:
                - i64
                - i32
                - i16
                - i8
            value:
              type: integer
          additionalProperties: false
        - type: object
          required:
            - type
            - representation
            - value
          properties:
            type:
              type: string
              const: uint
            representation:
              type: string
              enum:
                - u64
                - u32
                - u16
                - u8
            value:
              type: integer
              minimum: 0
          additionalProperties: false
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              const: bool
            value:
              type: boolean
          additionalProperties: false
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              const: string
            value:
              type: string
          additionalProperties: false
        - type: object
          required:
            - type
            - representation
            - value
          properties:
            type:
              type: string
              const: color
            representation:
              type: string
              enum:
                - rgba32f
                - rgba16f
                - rgba8unorm
                - rgb8unorm
            colorSpace:
              type: string
              enum:
                - linear
                - srgb
            value:
              type: array
              prefixItems:
                - type: number
                - type: number
                - type: number
                - type: number
              minItems: 4
              maxItems: 4
          additionalProperties: false
    RuntimeControlAtom:
      oneOf:
        - $ref: "#/components/schemas/RuntimeControlValue"
    RuntimeControlMessage:
      type: object
      required:
        - selector
        - atoms
      properties:
        selector:
          type: string
          minLength: 1
          description: Message selector, such as bang, set, float, int, symbol, list, or any object-specific selector.
        atoms:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeControlAtom"
      additionalProperties: false
    RuntimeControlEventRequest:
      type: object
      required:
        - nodeId
        - portId
        - message
      properties:
        nodeId:
          type: string
        portId:
          type: string
          enum:
            - in
            - set
            - bang
            - value
        message:
          $ref: "#/components/schemas/RuntimeControlMessage"
      additionalProperties: false
    RuntimeControlEmission:
      type: object
      required:
        - nodeId
        - portId
        - message
      properties:
        nodeId:
          type: string
        portId:
          type: string
        message:
          $ref: "#/components/schemas/RuntimeControlMessage"
      additionalProperties: false
    RuntimeControlEventResponse:
      type: object
      required:
        - ok
        - emitted
        - changed
        - controlRevision
        - diagnostics
      properties:
        ok:
          type: boolean
        emitted:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeControlEmission"
        changed:
          type: boolean
          description: True when the event changed runtime control values or typed channel state.
        controlRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
          description: Current runtime control revision when available.
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
      additionalProperties: false
    RuntimeControlStateResponse:
      type: object
      required:
        - ok
        - controlRevision
        - values
        - channels
        - diagnostics
      properties:
        ok:
          type: boolean
        controlRevision:
          type: integer
          minimum: 0
        values:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RuntimeControlValue"
        channels:
          type: object
          description: Latest messages for object-owned named channels keyed as dataKind:name.
          additionalProperties:
            $ref: "#/components/schemas/RuntimeControlMessage"
        diagnostics:
