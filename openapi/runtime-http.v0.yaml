openapi: 3.1.0
info:
  title: Skenion Runtime HTTP API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Return local runtime health.
      responses:
        "200":
          description: Runtime is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v0/runtime/info:
    get:
      summary: Return runtime identity and capability metadata.
      responses:
        "200":
          description: Runtime metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeInfoResponse"
  /v0/validate:
    post:
      summary: Validate a complete project payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "200":
          description: Project validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeApiResponse"
  /v0/plan:
    post:
      summary: Validate and build an execution plan for a project payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "200":
          description: Project planning result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeApiResponse"
  /v0/run:
    post:
      summary: Validate, plan, and run a dummy execution for a project payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunProjectRequest"
      responses:
        "200":
          description: Dummy execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeApiResponse"
  /v0/session:
    get:
      summary: Return the current local runtime session state.
      responses:
        "200":
          description: Current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
    delete:
      summary: Clear the current local runtime session.
      responses:
        "200":
          description: Cleared session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/load:
    post:
      summary: Validate and load a project payload into the local runtime session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "200":
          description: Session state after load attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/validate:
    post:
      summary: Validate the currently loaded local runtime session.
      responses:
        "200":
          description: Session validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/plan:
    post:
      summary: Build an execution plan for the currently loaded local runtime session.
      responses:
        "200":
          description: Session planning result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/run:
    post:
      summary: Run a dummy execution from the currently loaded local runtime session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRunRequest"
      responses:
        "200":
          description: Session dummy execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/patch:
    post:
      summary: Apply a graph patch to the currently loaded local runtime session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphPatchV01"
      responses:
        "200":
          description: Patch application result and current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePatchResponse"
  /v0/session/history:
    get:
      summary: Return the current local runtime session patch history.
      responses:
        "200":
          description: Current session patch history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphPatchHistoryV01"
  /v0/session/undo:
    post:
      summary: Undo the latest accepted patch in the local runtime session.
      responses:
        "200":
          description: Undo result and current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePatchResponse"
  /v0/session/redo:
    post:
      summary: Redo the latest undone patch in the local runtime session.
      responses:
        "200":
          description: Redo result and current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePatchResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - ok
        - service
        - version
      properties:
        ok:
          type: boolean
        service:
          type: string
          const: skenion-runtime
        version:
          type: string
    RuntimeInfoResponse:
      type: object
      required:
        - name
        - version
        - apiVersion
        - capabilities
      properties:
        name:
          type: string
          const: skenion-runtime
        version:
          type: string
        apiVersion:
          type: string
          const: 0.1.0
        capabilities:
          type: array
          items:
            type: string
          examples:
            - ["project.validate", "project.plan", "dummy.run", "session.load", "session.validate", "session.plan", "session.run", "session.patch", "session.history", "session.undo", "session.redo", "session.clear"]
    ProjectRequest:
      type: object
      required:
        - graph
        - nodes
      properties:
        graph:
          $ref: "#/components/schemas/GraphDocumentV01"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeDefinitionManifestV01"
    RunProjectRequest:
      allOf:
        - $ref: "#/components/schemas/ProjectRequest"
        - type: object
          properties:
            frames:
              type: integer
              minimum: 0
    RuntimeApiResponse:
      type: object
      required:
        - ok
        - diagnostics
        - plan
        - report
      properties:
        ok:
          type: boolean
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
        plan:
          anyOf:
            - $ref: "#/components/schemas/ExecutionPlan"
            - type: "null"
        report:
          anyOf:
            - $ref: "#/components/schemas/DummyExecutionReport"
            - type: "null"
    RuntimeSessionResponse:
      type: object
      required:
        - ok
        - loaded
        - graphId
        - graphRevision
        - sessionRevision
        - diagnostics
        - plan
        - report
      properties:
        ok:
          type: boolean
        loaded:
          type: boolean
        graphId:
          anyOf:
            - type: string
            - type: "null"
        graphRevision:
          anyOf:
            - type: string
            - type: "null"
        sessionRevision:
          type: integer
          minimum: 0
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
        plan:
          anyOf:
            - $ref: "#/components/schemas/ExecutionPlan"
            - type: "null"
        report:
          anyOf:
            - $ref: "#/components/schemas/DummyExecutionReport"
            - type: "null"
    SessionRunRequest:
      type: object
      properties:
        frames:
          type: integer
          minimum: 0
    RuntimePatchResponse:
      type: object
      required:
        - ok
        - applied
        - conflict
        - graph
        - session
        - event
        - history
        - diagnostics
      properties:
        ok:
          type: boolean
        applied:
          type: boolean
        conflict:
          type: boolean
        graph:
          anyOf:
            - $ref: "#/components/schemas/GraphDocumentV01"
            - type: "null"
        session:
          $ref: "#/components/schemas/RuntimeSessionResponse"
        event:
          anyOf:
            - $ref: "#/components/schemas/GraphPatchEventV01"
            - type: "null"
        history:
          $ref: "#/components/schemas/GraphPatchHistoryV01"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
    RuntimeDiagnostic:
      type: object
      required:
        - severity
        - message
      properties:
        severity:
          type: string
          enum:
            - error
        message:
          type: string
    ExecutionPlan:
      type: object
      required:
        - graphId
        - graphRevision
        - nodes
        - edges
        - groups
      properties:
        graphId:
          type: string
        graphRevision:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/PlanNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/PlanEdge"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/ExecutionGroup"
    PlanNode:
      type: object
      required:
        - nodeId
        - kind
        - kindVersion
        - executionModel
        - order
      properties:
        nodeId:
          type: string
        kind:
          type: string
        kindVersion:
          type: string
        executionModel:
          type: string
        order:
          type: integer
          minimum: 0
    PlanEdge:
      type: object
      required:
        - fromNode
        - fromPort
        - toNode
        - toPort
      properties:
        fromNode:
          type: string
        fromPort:
          type: string
        toNode:
          type: string
        toPort:
          type: string
    ExecutionGroup:
      type: object
      required:
        - executionModel
        - nodeIds
      properties:
        executionModel:
          type: string
        nodeIds:
          type: array
          items:
            type: string
    DummyExecutionReport:
      type: object
      required:
        - graphId
        - graphRevision
        - frameCount
        - frames
      properties:
        graphId:
          type: string
        graphRevision:
          type: string
        frameCount:
          type: integer
          minimum: 1
        frames:
          type: array
          items:
            $ref: "#/components/schemas/DummyFrameReport"
    DummyFrameReport:
      type: object
      required:
        - index
        - executedNodes
      properties:
        index:
          type: integer
          minimum: 0
        executedNodes:
          type: array
          items:
            $ref: "#/components/schemas/DummyNodeExecution"
    DummyNodeExecution:
      type: object
      required:
        - nodeId
        - kind
        - kindVersion
        - executionModel
        - order
        - status
      properties:
        nodeId:
          type: string
        kind:
          type: string
        kindVersion:
          type: string
        executionModel:
          type: string
        order:
          type: integer
          minimum: 0
        status:
          type: string
    GraphDocumentV01:
      type: object
      required:
        - schema
        - schemaVersion
        - id
        - revision
        - nodes
        - edges
      properties:
        schema:
          type: string
          const: skenion.graph
        schemaVersion:
          type: string
          const: 0.1.0
        id:
          type: string
        revision:
          type: string
        nodes:
          type: array
          items:
            type: object
            additionalProperties: true
        edges:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    GraphPatchV01:
      type: object
      required:
        - schema
        - schemaVersion
        - id
        - baseRevision
        - ops
      properties:
        schema:
          type: string
          const: skenion.graph.patch
        schemaVersion:
          type: string
          const: 0.1.0
        id:
          type: string
        baseRevision:
          type: string
        clientId:
          type: string
        createdAt:
          type: string
        description:
          type: string
        ops:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    GraphPatchEventV01:
      type: object
      required:
        - schema
        - schemaVersion
        - id
        - sequence
        - kind
        - patch
        - inversePatch
        - revisionBefore
        - revisionAfter
        - createdAt
      properties:
        schema:
          type: string
          const: skenion.graph.patch.event
        schemaVersion:
          type: string
          const: 0.1.0
        id:
          type: string
        sequence:
          type: integer
          minimum: 1
        kind:
          type: string
          enum:
            - apply
            - undo
            - redo
        patch:
          $ref: "#/components/schemas/GraphPatchV01"
        inversePatch:
          $ref: "#/components/schemas/GraphPatchV01"
        revisionBefore:
          type: string
        revisionAfter:
          type: string
        clientId:
          type: string
        description:
          type: string
        subjectEventId:
          type: string
        createdAt:
          type: string
      additionalProperties: true
    GraphPatchHistoryV01:
      type: object
      required:
        - schema
        - schemaVersion
        - events
        - canUndo
        - canRedo
        - undoDepth
        - redoDepth
      properties:
        schema:
          type: string
          const: skenion.graph.patch.history
        schemaVersion:
          type: string
          const: 0.1.0
        events:
          type: array
          items:
            $ref: "#/components/schemas/GraphPatchEventV01"
        canUndo:
          type: boolean
        canRedo:
          type: boolean
        undoDepth:
          type: integer
          minimum: 0
        redoDepth:
          type: integer
          minimum: 0
      additionalProperties: false
    NodeDefinitionManifestV01:
      type: object
      required:
        - schema
        - schemaVersion
        - id
        - version
        - displayName
        - category
        - ports
        - execution
        - state
        - permissions
        - capabilities
      properties:
        schema:
          type: string
          const: skenion.node.definition
        schemaVersion:
          type: string
          const: 0.1.0
        id:
          type: string
        version:
          type: string
        displayName:
          type: string
        category:
          type: string
        ports:
          type: array
          items:
            type: object
            additionalProperties: true
        execution:
          type: object
          additionalProperties: true
        state:
          type: object
          additionalProperties: true
        permissions:
          type: array
          items:
            type: string
        capabilities:
          type: array
          items:
            type: string
      additionalProperties: true
