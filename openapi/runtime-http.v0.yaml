openapi: 3.1.0
info:
  title: Skenion Runtime HTTP API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Return local runtime health.
      responses:
        "200":
          description: Runtime is reachable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /v0/runtime/info:
    get:
      summary: Return runtime identity and capability metadata.
      responses:
        "200":
          description: Runtime metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeInfoResponse"
  /v0/validate:
    post:
      summary: Validate a complete project payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "200":
          description: Project validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeApiResponse"
  /v0/plan:
    post:
      summary: Validate and build an execution plan for a project payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "200":
          description: Project planning result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeApiResponse"
  /v0/run:
    post:
      summary: Validate, plan, and run a dummy execution for a project payload.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunProjectRequest"
      responses:
        "200":
          description: Dummy execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeApiResponse"
  /v0/session:
    get:
      summary: Return the current local runtime session state.
      responses:
        "200":
          description: Current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
    delete:
      summary: Clear the current local runtime session.
      responses:
        "200":
          description: Cleared session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/load:
    post:
      summary: Validate and load a project payload into the local runtime session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectRequest"
      responses:
        "200":
          description: Session state after load attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/validate:
    post:
      summary: Validate the currently loaded local runtime session.
      responses:
        "200":
          description: Session validation result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/plan:
    post:
      summary: Build an execution plan for the currently loaded local runtime session.
      responses:
        "200":
          description: Session planning result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/run:
    post:
      summary: Run a dummy execution from the currently loaded local runtime session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRunRequest"
      responses:
        "200":
          description: Session dummy execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSessionResponse"
  /v0/session/patch:
    post:
      summary: Apply a graph patch to the currently loaded local runtime session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GraphPatchV01"
      responses:
        "200":
          description: Patch application result and current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePatchResponse"
  /v0/session/history:
    get:
      summary: Return the current local runtime session patch history.
      responses:
        "200":
          description: Current session patch history.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphPatchHistoryV01"
  /v0/session/control/event:
    post:
      summary: Dispatch a runtime-only control event to the current local session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeControlEventRequest"
      responses:
        "200":
          description: Control event dispatch result and emitted output values.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeControlEventResponse"
  /v0/session/control/state:
    get:
      summary: Return runtime-only control state for the current local session.
      responses:
        "200":
          description: Current control values by stateful value node id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeControlStateResponse"
  /v0/session/control/read:
    post:
      summary: Read a graph param, port metadata, or runtime control state by node address.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeControlReadRequest"
      responses:
        "200":
          description: Addressed control read result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeControlReadResponse"
  /v0/session/undo:
    post:
      summary: Undo the latest accepted patch in the local runtime session.
      responses:
        "200":
          description: Undo result and current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePatchResponse"
  /v0/session/redo:
    post:
      summary: Redo the latest undone patch in the local runtime session.
      responses:
        "200":
          description: Redo result and current session state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePatchResponse"
  /v0/session/preview:
    get:
      summary: Return the current local runtime session preview status.
      responses:
        "200":
          description: Current session preview status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePreviewStatusResponse"
  /v0/session/preview/start:
    post:
      summary: Start the local native preview for the currently loaded session.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimePreviewStartRequest"
      responses:
        "200":
          description: Preview status after start attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePreviewStatusResponse"
  /v0/session/preview/stop:
    post:
      summary: Stop the current local native preview.
      responses:
        "200":
          description: Preview status after stop attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePreviewStatusResponse"
  /v0/session/preview/restart:
    post:
      summary: Restart the local native preview from the current session plan.
      responses:
        "200":
          description: Preview status after restart attempt.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimePreviewStatusResponse"
  /v0/session/telemetry:
    get:
      summary: Return a read-only runtime telemetry snapshot.
      responses:
        "200":
          description: Current session, preview, render, and process telemetry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeTelemetrySnapshot"
  /v0/session/telemetry/stream:
    get:
      summary: Stream runtime telemetry snapshots with Server-Sent Events.
      responses:
        "200":
          description: Runtime telemetry event stream.
          content:
            text/event-stream:
              schema:
                type: string
              examples:
                telemetry:
                  value: |
                    event: telemetry
                    data: {"schema":"skenion.runtime.telemetry","schemaVersion":"0.1.0","ok":true}
  /v0/session/render/generated-shader:
    get:
      summary: Return the generated WGSL source for the current fullscreen shader preview.
      responses:
        "200":
          description: Generated shader source or diagnostics explaining why it is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedShaderResponse"
components:
  schemas:
    HealthResponse:
      type: object
      required:
        - ok
        - service
        - version
      properties:
        ok:
          type: boolean
        service:
          type: string
          const: skenion-runtime
        version:
          type: string
    RuntimeInfoResponse:
      type: object
      required:
        - name
        - version
        - apiVersion
        - capabilities
      properties:
        name:
          type: string
          const: skenion-runtime
        version:
          type: string
        apiVersion:
          type: string
          const: 0.1.0
        capabilities:
          type: array
          items:
            type: string
          examples:
            - ["project.validate", "project.plan", "dummy.run", "session.load", "session.validate", "session.plan", "session.run", "session.patch", "session.history", "session.undo", "session.redo", "session.control.event", "session.control.state", "session.control.read", "session.preview.status", "session.preview.start", "session.preview.stop", "session.preview.restart", "session.preview.controlState", "session.render.generatedShader", "session.telemetry", "session.telemetry.stream", "session.clear"]
    ProjectRequest:
      type: object
      required:
        - graph
        - nodes
      properties:
        graph:
          $ref: "#/components/schemas/GraphDocumentV01"
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodeDefinitionManifestV01"
    RunProjectRequest:
      allOf:
        - $ref: "#/components/schemas/ProjectRequest"
        - type: object
          properties:
            frames:
              type: integer
              minimum: 0
    RuntimeApiResponse:
      type: object
      required:
        - ok
        - diagnostics
        - plan
        - report
      properties:
        ok:
          type: boolean
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
        plan:
          anyOf:
            - $ref: "#/components/schemas/ExecutionPlan"
            - type: "null"
        report:
          anyOf:
            - $ref: "#/components/schemas/DummyExecutionReport"
            - type: "null"
    RuntimeSessionResponse:
      type: object
      required:
        - ok
        - loaded
        - graphId
        - graphRevision
        - sessionRevision
        - controlRevision
        - diagnostics
        - plan
        - report
      properties:
        ok:
          type: boolean
        loaded:
          type: boolean
        graphId:
          anyOf:
            - type: string
            - type: "null"
        graphRevision:
          anyOf:
            - type: string
            - type: "null"
        sessionRevision:
          type: integer
          minimum: 0
        controlRevision:
          type: integer
          minimum: 0
          description: Monotonic revision for runtime control state changes. Graph/session mutations use sessionRevision.
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
        plan:
          anyOf:
            - $ref: "#/components/schemas/ExecutionPlan"
            - type: "null"
        report:
          anyOf:
            - $ref: "#/components/schemas/DummyExecutionReport"
            - type: "null"
    SessionRunRequest:
      type: object
      properties:
        frames:
          type: integer
          minimum: 0
    RuntimePatchResponse:
      type: object
      required:
        - ok
        - applied
        - conflict
        - graph
        - session
        - event
        - history
        - diagnostics
      properties:
        ok:
          type: boolean
        applied:
          type: boolean
        conflict:
          type: boolean
        graph:
          anyOf:
            - $ref: "#/components/schemas/GraphDocumentV01"
            - type: "null"
        session:
          $ref: "#/components/schemas/RuntimeSessionResponse"
        event:
          anyOf:
            - $ref: "#/components/schemas/GraphPatchEventV01"
            - type: "null"
        history:
          $ref: "#/components/schemas/GraphPatchHistoryV01"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
    RuntimeControlValue:
      oneOf:
        - type: object
          required:
            - type
          properties:
            type:
              type: string
              const: bang
          additionalProperties: false
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              const: f32
            value:
              type: number
          additionalProperties: false
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              const: i32
            value:
              type: integer
          additionalProperties: false
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              const: bool
            value:
              type: boolean
          additionalProperties: false
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              const: string
            value:
              type: string
          additionalProperties: false
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              const: rgba
            value:
              type: array
              prefixItems:
                - type: number
                - type: number
                - type: number
                - type: number
              minItems: 4
              maxItems: 4
          additionalProperties: false
    RuntimeControlEventRequest:
      type: object
      required:
        - nodeId
        - portId
        - value
      properties:
        nodeId:
          type: string
        portId:
          type: string
          enum:
            - in
            - set
            - bang
            - value
        value:
          $ref: "#/components/schemas/RuntimeControlValue"
      additionalProperties: false
    RuntimeControlEmission:
      type: object
      required:
        - nodeId
        - portId
        - value
      properties:
        nodeId:
          type: string
        portId:
          type: string
        value:
          $ref: "#/components/schemas/RuntimeControlValue"
      additionalProperties: false
    RuntimeControlEventResponse:
      type: object
      required:
        - ok
        - emitted
        - changed
        - controlRevision
        - diagnostics
      properties:
        ok:
          type: boolean
        emitted:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeControlEmission"
        changed:
          type: boolean
          description: True when the event changed runtime control values or typed channel state.
        controlRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
          description: Current runtime control revision when available.
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
      additionalProperties: false
    RuntimeControlStateResponse:
      type: object
      required:
        - ok
        - controlRevision
        - values
        - channels
        - diagnostics
      properties:
        ok:
          type: boolean
        controlRevision:
          type: integer
          minimum: 0
        values:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RuntimeControlValue"
        channels:
          type: object
          description: Latest values for typed send/receive channels keyed as dataKind:name.
          additionalProperties:
            $ref: "#/components/schemas/RuntimeControlValue"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
      additionalProperties: false
    PreviewControlStateSnapshot:
      type: object
      description: Runtime-internal control snapshot written by the Runtime server and polled by the local preview child process.
      required:
        - schema
        - schemaVersion
        - sessionRevision
        - controlRevision
        - values
        - channels
        - writtenAt
      properties:
        schema:
          type: string
          const: skenion.preview.control-state
        schemaVersion:
          type: string
          const: 0.1.0
        sessionRevision:
          type: integer
          minimum: 0
        controlRevision:
          type: integer
          minimum: 0
        values:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RuntimeControlValue"
        channels:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RuntimeControlValue"
        writtenAt:
          type: string
          examples:
            - unix-ms:1710000000000
      additionalProperties: false
    RuntimeControlReadTarget:
      type: string
      enum:
        - param
        - port
        - state
    RuntimeControlReadRequest:
      type: object
      required:
        - nodeId
        - target
        - id
      properties:
        nodeId:
          type: string
        target:
          $ref: "#/components/schemas/RuntimeControlReadTarget"
        id:
          type: string
      additionalProperties: false
    RuntimeControlReadValue:
      oneOf:
        - $ref: "#/components/schemas/RuntimeControlValue"
        - type: object
          required:
            - type
            - value
          properties:
            type:
              type: string
              const: json
            value: true
          additionalProperties: false
    RuntimeControlReadResponse:
      type: object
      required:
        - ok
        - address
        - value
        - diagnostics
      properties:
        ok:
          type: boolean
        address:
          $ref: "#/components/schemas/RuntimeControlReadRequest"
        value:
          anyOf:
            - $ref: "#/components/schemas/RuntimeControlReadValue"
            - type: "null"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
      additionalProperties: false
    RuntimePreviewStartRequest:
      type: object
      properties:
        restart:
          type: boolean
          default: false
      additionalProperties: false
    RuntimePreviewState:
      type: string
      enum:
        - stopped
        - starting
        - running
        - exited
        - error
    RuntimePreviewStatusResponse:
      type: object
      required:
        - ok
        - state
        - pid
        - graphId
        - graphRevision
        - sessionRevision
        - previewSessionRevision
        - controlRevision
        - previewControlRevision
        - controlLive
        - lastControlUpdateAt
        - stale
        - startedAt
        - exitedAt
        - exitCode
        - message
        - diagnostics
      properties:
        ok:
          type: boolean
        state:
          $ref: "#/components/schemas/RuntimePreviewState"
        pid:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        graphId:
          anyOf:
            - type: string
            - type: "null"
        graphRevision:
          anyOf:
            - type: string
            - type: "null"
        sessionRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        previewSessionRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        controlRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
          description: Runtime session control revision at the time status was produced.
        previewControlRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
          description: Latest control revision written to or observed by the preview process.
        controlLive:
          type: boolean
          description: True when the running preview is using the latest known runtime control revision.
        lastControlUpdateAt:
          anyOf:
            - type: string
            - type: "null"
        stale:
          type: boolean
        startedAt:
          anyOf:
            - type: string
            - type: "null"
        exitedAt:
          anyOf:
            - type: string
            - type: "null"
        exitCode:
          anyOf:
            - type: integer
            - type: "null"
        message:
          anyOf:
            - type: string
            - type: "null"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
      additionalProperties: false
    RuntimeTelemetrySnapshot:
      type: object
      required:
        - schema
        - schemaVersion
        - ok
        - timestamp
        - session
        - preview
        - render
        - process
        - diagnostics
      properties:
        schema:
          type: string
          const: skenion.runtime.telemetry
        schemaVersion:
          type: string
          const: 0.1.0
        ok:
          type: boolean
        timestamp:
          type: string
          examples:
            - unix-ms:1710000000000
        session:
          $ref: "#/components/schemas/RuntimeTelemetrySession"
        preview:
          $ref: "#/components/schemas/RuntimeTelemetryPreview"
        render:
          $ref: "#/components/schemas/RuntimeTelemetryRender"
        process:
          $ref: "#/components/schemas/RuntimeTelemetryProcess"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeDiagnostic"
      additionalProperties: true
    RuntimeTelemetrySession:
      type: object
      required:
        - loaded
        - graphId
        - graphRevision
        - sessionRevision
        - controlRevision
      properties:
        loaded:
          type: boolean
        graphId:
          anyOf:
            - type: string
            - type: "null"
        graphRevision:
          anyOf:
            - type: string
            - type: "null"
        sessionRevision:
          type: integer
          minimum: 0
        controlRevision:
          type: integer
          minimum: 0
      additionalProperties: true
    RuntimeTelemetryPreview:
      type: object
      required:
        - state
        - pid
        - stale
        - graphId
        - graphRevision
        - sessionRevision
        - previewSessionRevision
        - controlRevision
        - previewControlRevision
        - controlLive
        - lastControlUpdateAt
      properties:
        state:
          $ref: "#/components/schemas/RuntimePreviewState"
        pid:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        stale:
          type: boolean
        graphId:
          anyOf:
            - type: string
            - type: "null"
        graphRevision:
          anyOf:
            - type: string
            - type: "null"
        sessionRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        previewSessionRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        controlRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        previewControlRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        controlLive:
          type: boolean
        lastControlUpdateAt:
          anyOf:
            - type: string
            - type: "null"
      additionalProperties: true
    RuntimeTelemetryRender:
      type: object
      required:
        - active
        - backend
        - renderer
        - framesRendered
        - approxFps
        - lastFrameMs
        - lastError
        - sourceNodeId
        - diagnostics
        - generatedSourceAvailable
        - controlRevision
        - previewControlRevision
        - controlLive
        - lastControlUpdateAt
      properties:
        active:
          type: boolean
        backend:
          anyOf:
            - type: string
            - type: "null"
        renderer:
          anyOf:
            - type: string
            - type: "null"
        framesRendered:
          type: integer
          minimum: 0
        approxFps:
          anyOf:
            - type: number
              minimum: 0
            - type: "null"
        lastFrameMs:
          anyOf:
            - type: number
              minimum: 0
            - type: "null"
        lastError:
          anyOf:
            - type: string
            - type: "null"
        sourceNodeId:
          anyOf:
            - type: string
            - type: "null"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/ShaderDiagnosticV01"
        generatedSourceAvailable:
          type: boolean
        controlRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        previewControlRevision:
          anyOf:
            - type: integer
              minimum: 0
            - type: "null"
        controlLive:
          type: boolean
        lastControlUpdateAt:
          anyOf:
            - type: string
            - type: "null"
      additionalProperties: true
    GeneratedShaderResponse:
      type: object
      required:
        - ok
        - nodeId
        - language
        - source
        - sourceMap
        - diagnostics
      properties:
        ok:
          type: boolean
        nodeId:
          anyOf:
            - type: string
            - type: "null"
        language:
          anyOf:
            - type: string
              const: wgsl
            - type: "null"
        source:
          anyOf:
            - type: string
            - type: "null"
        sourceMap:
          anyOf:
            - $ref: "#/components/schemas/GeneratedShaderSourceMapV01"
            - type: "null"
        diagnostics:
          type: array
          items:
            $ref: "#/components/schemas/ShaderDiagnosticV01"
      additionalProperties: false
    GeneratedShaderSourceMapV01:
      type: object
      required:
        - userSourceStartLine
        - generatedLineOffset
      properties:
        userSourceStartLine:
          type: integer
          minimum: 1
        generatedLineOffset:
          type: integer
          minimum: 0
      additionalProperties: false
    ShaderDiagnosticV01:
      type: object
      required:
        - severity
        - phase
        - code
        - message
        - source
      properties:
        severity:
          type: string
          enum:
            - error
            - warning
            - info
        phase:
          type: string
          enum:
            - interface-analysis
            - source-sync
            - wgsl-generation
            - wgsl-compile
