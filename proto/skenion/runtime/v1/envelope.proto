syntax = "proto3";

package skenion.runtime.v1;

message ProtocolVersion {
  uint32 major = 1;
  uint32 minor = 2;
  uint32 patch = 3;
}

message VersionRange {
  ProtocolVersion min = 1;
  ProtocolVersion max_exclusive = 2;
}

message Capability {
  string id = 1;
  ProtocolVersion version = 2;
}

message Hello {
  string client_name = 1;
  string client_version = 2;
  repeated VersionRange supported_runtime_wire = 3;
  repeated VersionRange supported_graph_schema = 4;
  repeated string requested_capabilities = 5;
  uint32 max_message_bytes = 6;
}

message HelloAck {
  string runtime_name = 1;
  string runtime_version = 2;
  ProtocolVersion selected_runtime_wire = 3;
  repeated Capability capabilities = 4;
  uint32 max_message_bytes = 5;
}

message Ack {
  string message_id = 1;
}

message Ping {
  uint64 sent_at_unix_ms = 1;
}

message Pong {
  uint64 sent_at_unix_ms = 1;
}

message RuntimeError {
  string code = 1;
  string message = 2;
  bool retryable = 3;
}

message ApplyRuntimeOperation {
  bytes operation_json = 1;
}

message RuntimeCommand {
  string command = 1;
  bytes payload_json = 2;
}

message RuntimeEvent {
  string event = 1;
  bytes payload_json = 2;
}

message TelemetryBatch {
  repeated TelemetrySample samples = 1;
}

message TelemetrySample {
  string name = 1;
  double value = 2;
  string unit = 3;
  uint64 observed_at_unix_ms = 4;
}

message AssetStatus {
  string asset_id = 1;
  string status = 2;
  string message = 3;
}

message PreviewStatus {
  string status = 1;
  string endpoint = 2;
}

message ClientEnvelope {
  reserved 20;
  reserved "apply_graph_patch";

  ProtocolVersion protocol_version = 1;
  string session_id = 2;
  string message_id = 3;
  string correlation_id = 4;
  uint64 sequence = 5;

  oneof payload {
    Hello hello = 10;
    Ack ack = 11;
    Ping ping = 12;
    RuntimeCommand runtime_command = 21;
    ApplyRuntimeOperation apply_runtime_operation = 22;
  }
}

message RuntimeEnvelope {
  ProtocolVersion protocol_version = 1;
  string session_id = 2;
  string message_id = 3;
  string correlation_id = 4;
  uint64 sequence = 5;

  oneof payload {
    HelloAck hello_ack = 10;
    Ack ack = 11;
    Pong pong = 12;
    RuntimeError error = 13;
    RuntimeEvent runtime_event = 20;
    TelemetryBatch telemetry_batch = 21;
    AssetStatus asset_status = 22;
    PreviewStatus preview_status = 23;
  }
}
