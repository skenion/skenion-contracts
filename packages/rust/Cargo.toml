[package]
name = "skenion-contracts"
version = "0.56.0"
edition = "2024"
description = "Rust contract types and validators for skenion"
license = "Apache-2.0"
repository = "https://github.com/skenion/skenion-contracts"
homepage = "https://github.com/skenion/skenion-contracts"
readme = "README.md"
keywords = ["skenion", "contracts", "schema", "runtime"]
categories = ["data-structures", "development-tools"]

[lib]
name = "skenion_contracts"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
